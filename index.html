<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="A simple H5 English learning app for young Chinese-speaking children."
    />
    <meta name="theme-color" content="#fff7e8" />
    <meta property="og:title" content="Little English" />
    <meta property="og:description" content="Scene-based English words and sentences for kids." />
    <meta property="og:type" content="website" />
    <title>Little English</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ffd166'/%3E%3Ctext x='32' y='42' font-size='34' text-anchor='middle'%3E📘%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="home-view" id="homeView" aria-labelledby="homeTitle">
        <header class="top-bar">
          <div>
            <p class="eyebrow">4 岁启蒙</p>
            <h1 id="homeTitle">Little English</h1>
          </div>
        </header>

        <div class="scene-grid" id="sceneGrid"></div>
      </section>

      <section class="scene-view is-hidden" id="sceneView" aria-labelledby="sceneTitle">
        <header class="scene-header">
          <button class="back-button" type="button" id="backButton" aria-label="返回">
            <span aria-hidden="true"></span>
          </button>
          <div>
            <p class="eyebrow" id="sceneSubtitle"></p>
            <h2 id="sceneTitle"></h2>
          </div>
        </header>

        <div class="word-grid" id="wordGrid"></div>
      </section>

      <div class="word-sheet is-hidden" id="wordSheet" role="dialog" aria-modal="true" aria-labelledby="sheetWord">
        <button class="sheet-close" type="button" id="closeSheet" aria-label="关闭">×</button>
        <div class="sheet-picture" id="sheetPicture"></div>
        <p class="word-label" id="sheetWord"></p>
        <button class="sound-row" type="button" id="wordSoundButton">
          <span>▶</span>
          <strong id="wordSoundText"></strong>
        </button>
        <button class="sentence-row" type="button" id="sentenceSoundButton">
          <span>▶</span>
          <strong id="sheetSentence"></strong>
        </button>
      </div>
      <div class="scrim is-hidden" id="scrim"></div>
      <div class="audio-toast is-hidden" id="audioToast" role="status" aria-live="polite"></div>
    </main>

    <script src="./build-env.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
